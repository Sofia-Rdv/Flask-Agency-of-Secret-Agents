{% extends 'base.html' %}

{% block content %}
<div class="terminal-box">
    <h2 class="neon-text">📂 ДОСЬЕ: {{ agent.codename }}</h2>
    <hr class="terminal-hr">

    <div class="agent-details">
        <p><strong>Dossier ID:</strong> #{{ agent.id }}</p>
        <p><strong>Уровень доступа:</strong> <span class="badge">{{ agent.access_level }}</span></p>
        <p><strong>Канал связи:</strong> {{ agent.phone }}</p>
        <p><strong>Email:</strong> {{ agent.email }}</p>
    </div>

    <div class="actions-group">
        <a href="{{ url_for('edit_agent', id=agent.id) }}" class="btn">Изменить данные</a>
        <a href="{{ url_for('index') }}" class="btn btn-outline">К списку</a>
        <a href="{{ url_for('delete_agent', id=agent.id) }}" class="delete-link" onclick="return confirm('Вы уверены?')">Уничтожить досье</a>
    </div>
</div>

{% endblock %}
