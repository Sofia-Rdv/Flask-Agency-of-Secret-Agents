{% extends 'base.html' %}

{% block content %}
<div class="terminal-box">
    <h2 class="neon-text">📂 ДОСЬЕ: {{ agent.codename }}</h2>
    <hr style="border-color: #45a29e; margin: 20px 0;">

    <div class="agent-details">
        <p><strong>Dossier ID:</strong> #{{ agent.id }}</p>
        <p><strong>Уровень доступа:</strong> <span class="badge">{{ agent.access_level }}</span></p>
        <p><strong>Канал связи:</strong> {{ agent.phone }}</p>
        <p><strong>Email:</strong> {{ agent.email }}</p>
    </div>

    <div class="actions" style="margin-top: 30px; display: flex; align-items: center; gap: 20px;">
        <a href="{{ url_for('edit_agent', id=agent.id) }}" class="btn">Изменить данные</a>
        <a href="{{ url_for('index') }}" class="btn" style="background: transparent; border: 1px solid #45a29e; color: #45a29e;">К списку</a>
        <a href="{{ url_for('delete_agent', id=agent.id) }}" class="delete-link" onclick="return confirm('Внимание! Вы собираетесь безвозвратно уничтожить досье. Продолжить?')">Уничтожить досье</a>
    </div>
</div>
{% endblock %}
